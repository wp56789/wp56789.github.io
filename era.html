<body>

        </div>

            纪元对照计算工具 | 基于PHP版本转换 | 使用BigNumber.js

    <script>

                yearInput.value = '2024';
                calculateEra();

            // 输入框按回车计算
            yearInput.addEventListener('keyup', function(event) {
                if (event.key === 'Enter') {
                    calculateEra();
                }

            function calculateEra() {

                // 纪元计算

                output += "陈祎" + flag(id, 602) + "年<br>";

                output += "行者" + flag(id, 1506) + "年<br>";
                output += "兔本" + flag(id, 1543) + "年<br>";
                output += "悟空" + flag(id, 1579) + "年<br><br>";
                
                output += "立极" + flag(id, 1568) + "年<br>";
                output += "崇祯" + flag(id, 1628) + "年<br>";
                output += "謄本" + flag(id, 1635) + "年<br>";
                output += "石笥" + flag(id, 1637) + "年<br><br>";
                
                output += "灵霄" + flag(id, -195) + "年<br>";
                output += "地府" + flag(id, 557) + "年<br>";
                
                output += "<br><br>※ 潮音寺纪元<br><br>";
                
                // 潮音寺纪元部分
                output += "赵语∶[todo] ";
                output += "<br>";

                output += "秦风∶[" + flag(id, -221) + "," + flag(id, -207) + "] ";
                output += "始皇[" + flag(id, -259) + "," + flag(id, -210) + "] ";
                output += "<br>";
                
                output += "楚歌∶[" + flag(id, -206) + "," + flag(id, -202) + "] ";
                output += "霸王[" + flag(id, -232) + "," + flag(id, -202) + "] ";
                output += "<br>";
                
                output += "汉赋∶[" + flag(id, -202) + "," + flag(id, 220) + "] ";
                output += "刘邦[" + flag(id, -256) + "," + flag(id, -195) + "] ";
                output += "刘彻[" + flag(id, -156) + "," + flag(id, -87) + "] ";
                output += "卫青[*," + flag(id, -106) + "] ";
                output += "霍去病[" + flag(id, -140) + "," + flag(id, -117) + "] ";
                output += "<br>";
                
                output += "唐诗∶[" + flag(id, 618) + "," + flag(id, 907) + "] ";
                output += "太宗[" + flag(id, 599) + "," + flag(id, 649) + "] ";
                output += "武曌[" + flag(id, 624) + "," + flag(id, 705) + "] ";
                output += "隆基[" + flag(id, 685) + "," + flag(id, 762) + "] ";
                output += "李白[" + flag(id, 701) + "," + flag(id, 762) + "] ";
                output += "高适[*" + flag(id, 704) + "," + flag(id, 765) + "] ";
                output += "颜真卿[*" + flag(id, 709) + "," + flag(id, 785) + "] ";
                output += "杜甫[" + flag(id, 712) + "," + flag(id, 770) + "] ";
                output += "李商隐[*" + flag(id, 813) + "," + flag(id, 858) + "] ";
                output += "<br>";
                
                output += "宋词∶[" + flag(id, 960) + "," + flag(id, 1127) + "," + flag(id, 1279) + "] ";
                output += "赵匡胤[" + flag(id, 927) + "," + flag(id, 976) + "] ";
                output += "赵光义[" + flag(id, 939) + "," + flag(id, 997) + "] ";
                output += "苏轼[" + flag(id, 1037) + "," + flag(id, 1101) + "] ";
                output += "岳飞[" + flag(id, 1103) + "," + flag(id, 1142) + "] ";
                output += "赵构[" + flag(id, 1107) + "," + flag(id, 1187) + "] ";
                output += "<br>";

                output += "元曲∶[" + flag(id, 1206) + "," + flag(id, 1271) + "," + flag(id, 1368) + "] ";
                output += "铁木真[" + flag(id, 1162) + "," + flag(id, 1227) + "] ";
                output += "忽必烈[" + flag(id, 1215) + "," + flag(id, 1294) + "] ";
                output += "郭守敬[" + flag(id, 1231) + "," + flag(id, 1316) + "] ";
                output += "关汉卿[*" + flag(id, 1234) + "," + flag(id, 1309) + "] ";
                output += "<br>";
                
                output += "明音∶[" + flag(id, 1368) + "," + flag(id, 1644) + "] ";
                output += "朱元璋[" + flag(id, 1328) + "," + flag(id, 1398) + "] ";
                output += "施耐庵[*" + flag(id, 1296) + "," + flag(id, 1372) + "] ";
                output += "罗贯中[*" + flag(id, 1330) + ",*" + flag(id, 1400) + "] ";
                output += "朱棣[" + flag(id, 1360) + "," + flag(id, 1424) + "] ";
                output += "祝允明[" + flag(id, 1461) + "," + flag(id, 1527) + "] ";
                output += "唐寅[" + flag(id, 1470) + "," + flag(id, 1524) + "] ";
                output += "文徵明[" + flag(id, 1470) + "," + flag(id, 1559) + "] ";
                output += "徐祯卿[" + flag(id, 1479) + "," + flag(id, 1511) + "] ";
                output += "吴承恩[*" + flag(id, 1504) + "," + flag(id, 1582) + "] ";
                output += "<br>";
                
                // 三才定位等计算
                output += "<br><br>※ 三才定位（☲ 儒释真道）<br>";
                output += era(id, {"天道/孔历": -551, "地理/孔丘": -479, "觉悟/佛历": -544});
                
                output += "<br><br>※ 三才定位（☰ 儒释正道）<br>";
                output += era(id, {"佛历": -544, "孔历": -551, "政历": -259});
                
                output += "<br><br>※ 三才定位（☲ 儒释法道）<br>";
                output += era(id, {"天界佛历": -544, "地界孔丘": -479, "人界政历": -259});
                
                output += "<br><br>※ 沙丘定位（☷ 儒师坤道）<br>";
                output += era(id, {"灵台": -295, "孔丘": -479, "沙丘": -210});
                
                output += "<br><br>※ 三星定位（☰ 儒师乾道）<br>";
                output += era(id, {"雍历": -339, "政历": -259, "孔历": -551});
                
                output += "<br><br>※ 三界定位（☵ 中五载道）<br>";
                output += era(id, {"天界灵霄": -195, "人界贞观": 627, "冥界地府": 557});
                
                output += "<br><br>※ 六耳监听（☷ 千里之音）<br>";
                const A1 = era(id, {"赵景王张耳": -203, "赵隐王如意": -198, "赵废王刘隐": -9}, true);
                const B1 = era(id, {"赵恭王刘恢": -181, "赵共王刘充": -65, "黄中五": 1627}, true);
                const addAB1 = A1[0] + B1[0];
                const mulAB1 = new BigNumber(A1[1]).times(new BigNumber(B1[1])).toString();
                output += "<br>";
                output += "（贺∶伽蓝∶" + A1[0] + ' + ' + B1[0] + ' = ' + addAB1 + " " + no_split(addAB1) + "）<br>";
                output += "（兰∶大乘∶" + A1[1] + ' × ' + B1[1] + ' = ' + mulAB1 + " " + no_split(mulAB1) + "）<br>";
                
                output += "<br><br>※ 六皇察理/道（☰ 天行健）<br>";
                const A2 = era(id, {"秦始皇": -259, "汉武帝": -156, "唐太宗": 598}, true);
                const B2 = era(id, {"宋太祖": 927, "元世祖": 1162, "明太祖": 1328}, true);
                const addAB2 = A2[0] + B2[0];
                const mulAB2 = new BigNumber(A2[1]).times(new BigNumber(B2[1])).toString();
                output += "<br>";
                output += "（贺∶伽蓝∶" + A2[0] + ' + ' + B2[0] + ' = ' + addAB2 + " " + no_split(addAB2) + "）<br>";
                output += "（兰∶大乘∶" + A2[1] + ' × ' + B2[1] + ' = ' + mulAB2 + " " + no_split(mulAB2) + "）<br>";
                
                output += "<br><br>※ 六皇察理/阅（☱ 兑上缺）<br>";
                const A3 = era(id, {"秦始皇": -221, "汉武帝": -141, "唐太宗": 626}, true);
                const B3 = era(id, {"宋太祖": 960, "元太祖": 1206, "明太祖": 1368}, true);
                const addAB3 = A3[0] + B3[0];
                const mulAB3 = new BigNumber(A3[1]).times(new BigNumber(B3[1])).toString();
                output += "<br>";
                output += "（贺∶伽蓝∶" + A3[0] + ' + ' + B3[0] + ' = ' + addAB3 + " " + no_split(addAB3) + "）<br>";
                output += "（兰∶大乘∶" + A3[1] + ' × ' + B3[1] + ' = ' + mulAB3 + " " + no_split(mulAB3) + "）<br>";
                
                output += "<br><br>※ 六皇察理/寂（☷ 地势坤）<br>";
                const A4 = era(id, {"秦始皇": -210, "汉武帝": -87, "唐太宗": 649}, true);
                const B4 = era(id, {"宋太祖": 976, "元世祖": 1294, "明太祖": 1398}, true);
                const addAB4 = A4[0] + B4[0];
                const mulAB4 = new BigNumber(A4[1]).times(new BigNumber(B4[1])).toString();
                output += "<br>";
                output += "（贺∶伽蓝∶" + A4[0] + ' + ' + B4[0] + ' = ' + addAB4 + " " + no_split(addAB4) + "）<br>";
                output += "（兰∶大乘∶" + A4[1] + ' × ' + B4[1] + ' = ' + mulAB4 + " " + no_split(mulAB4) + "）<br>";
                
                resultOutput.innerHTML = output;
            }
            
            function flag(id, base = 0) {
                if (id == base) {
                    return 1;
                }
                if (base > 0) {
                    if (id > base) {
                        return id - base + 1;
                    }
                    if (id < base && id > 0) {
                        return id - base;
                    }
                    if (id < base && id < 0) {
                        return id - base;
                    }
                }
                if (base < 0) {
                    if (id > base && id > 0) {
                        return id - base;
                    }
        
                    if (id > base && id < 0) {
                        return id - base;
                    }
        
                    if (id < base && id < 0) {
                        return id - base;
                    }
                }
                return 0;
            }
            
            function era(year = 0, vars = {}, returnValues = false) {
                let title = [];
                let add = 0;
                let mul = new BigNumber(1);
                let strAdd = "";
                
                for (const [k, v] of Object.entries(vars)) {
                    const flagVal = flag(year, v);
                    add += flagVal;
                    mul = mul.times(new BigNumber(flagVal));
                    title.push(k + flagVal + "年");
                    strAdd += (flagVal > 0 ? " +" : " ") + parseInt(flagVal);
                }
                
                if (returnValues) {
                    return [add, mul.toString()];
                }
                
                let output = "<br>（" + title.join(' × ') + "）";
                output += "-> " + mul.toString() + no_split(mul.toString()) + "<br>";
                output += "（贺字数∶" + strAdd.trim() + "）= " + add + no_split(add) + "<br>";
                
                return output;
            }
            
            function no_split(no) {
                const strNo = no.toString();
                const split = strNo.split('');
                let prefix = '';
                
                if (split[0] === '-') {
                    prefix = '-';
                    split.shift();
                }
                
                const sum = split.reduce((acc, digit) => {
                    // 处理非数字字符（如小数点）
                    const num = parseInt(digit);
                    return isNaN(num) ? acc : acc + num;
                }, 0);
                
                return " +> " + prefix + sum;
            }
        });
    </script>
